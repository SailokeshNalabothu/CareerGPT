version: '3.8'

services:
  mongodb:
    image: mongo:6.0
    container_name: careergpt-mongodb
    ports:
      - "27017:27017"
    command: ["mongod", "--replSet", "rs0", "--bind_ip_all"]
    volumes:
      - mongodb_data:/data/db

  mongodb-setup:
    image: mongo:6.0
    container_name: careergpt-mongodb-setup
    depends_on:
      - mongodb
    entrypoint: [ "bash", "-c", "sleep 5 && mongosh --host mongodb:27017 --eval 'rs.initiate({_id: \"rs0\", members: [{_id: 0, host: \"localhost:27017\"}]})' || true" ]

  redis:
    image: redis:7.0-alpine
    container_name: careergpt-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

volumes:
  mongodb_data:
  redis_data:
